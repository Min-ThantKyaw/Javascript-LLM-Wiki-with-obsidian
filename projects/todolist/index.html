<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen text-slate-800 antialiased">

    <div class="max-w-7xl mx-auto p-4 lg:p-10">
        <!-- Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

            <!-- 1. Sidebar -->
            <div class="lg:col-span-3 space-y-8">
                <!-- App Logo/Title -->
                <div class="px-2">
                    <h1 class="text-2xl font-black text-indigo-600 tracking-tight">TASK<span class="text-slate-400">FLOW</span></h1>
                </div>

                <!-- Filters Section -->
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200/60">
                    <h2 class="text-[11px] font-bold text-slate-400 mb-4 tracking-[0.1em] uppercase px-2">Main Menu</h2>
                    <nav class="space-y-1">
                        <button onclick="setFilter('all')" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition-all group">
                            <i class="fas fa-layer-group text-slate-400 group-hover:text-indigo-500"></i>
                            <span class="font-medium">All Tasks</span>
                        </button>
                        <button onclick="setFilter('today')" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition-all group">
                            <i class="fas fa-calendar-day text-slate-400 group-hover:text-indigo-500"></i>
                            <span class="font-medium">Today</span>
                        </button>
                        <button onclick="setFilter('future')" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition-all group">
                            <i class="fas fa-calendar-alt text-slate-400 group-hover:text-indigo-500"></i>
                            <span class="font-medium">Upcoming</span>
                        </button>
                        <button onclick="setFilter('completed')" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition-all group">
                            <i class="fas fa-check-circle text-slate-400 group-hover:text-indigo-500"></i>
                            <span class="font-medium">Completed</span>
                        </button>
                    </nav>

                    <!-- Categories Section -->
                    <div class="mt-8">
                        <div class="flex justify-between items-center mb-4 px-2">
                            <h2 class="text-[11px] font-bold text-slate-400 tracking-[0.1em] uppercase">Categories</h2>
                        </div>

                        <!-- Add Category Inline -->
                        <div class="mb-4 p-2 bg-slate-50 rounded-2xl border border-dashed border-slate-300">
                            <input type="text" id="newCategoryInput" placeholder="New category..."
                                class="w-full bg-transparent text-sm px-2 py-1.5 outline-none focus:ring-0" />
                            <button onclick="createNewCategory()"
                                class="w-full mt-2 bg-white text-xs font-bold py-2 rounded-lg border border-slate-200 shadow-sm hover:bg-slate-100 transition">
                                <i class="fas fa-plus mr-1"></i> Add Category
                            </button>
                        </div>

                        <!--Category List-->
                        <div id="categoryList" class="space-y-1 max-h-48 overflow-y-auto mb-4">
                            <ul class="space-y-1 *:bg-slate-50 *:rounded-lg *:px-2 *:py-1.5 hover:*:bg-slate-100 transition-all">
                            <li id="categoryItem"></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. Main Content -->
            <div class="lg:col-span-9 space-y-6">
                <!-- Input Section -->
                <div class="bg-white p-2 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100">
                    <div class="flex flex-col lg:flex-row gap-2">
                        <input type="text" id="todoInput" placeholder="Write your task..."
                            class="flex-[2] bg-transparent px-6 py-4 outline-none text-lg font-medium placeholder:text-slate-300" />

                        <div class="flex items-center gap-2 p-2 bg-slate-50 rounded-2xl lg:rounded-[1.5rem]">
                            <input type="date" id="todoDate" class="bg-transparent px-3 py-2 text-sm font-semibold outline-none text-slate-600" />
                            <div class="h-6 w-[1px] bg-slate-200 hidden lg:block"></div>
                            <select id="todoCategory" class="bg-transparent px-3 py-2 text-sm font-semibold outline-none text-slate-600 cursor-pointer">
                                <!-- Dynamic Options -->
                            </select>
                            <button id="addButton" class="bg-indigo-600 text-white p-3 lg:px-6 lg:py-3 rounded-xl lg:rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
                                <span class="hidden lg:inline">Add Task</span>
                                <i class="fas fa-plus lg:hidden"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Status Header -->
                <div class="flex justify-between items-end px-4 mt-10">
                    <div>
                        <h2 id="listTitle" class="text-3xl font-extrabold text-slate-800">All Tasks</h2>
                        <p class="text-slate-400 text-sm font-medium mt-1">Organize your daily routine</p>
                    </div>
                    <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-2xl border border-slate-100 shadow-sm">
                        <span id="taskCount" class="text-indigo-600 font-black text-lg">0</span>
                        <span class="text-slate-400 text-xs font-bold uppercase tracking-wider">Tasks</span>
                    </div>
                </div>

                <!-- ToDo List -->
                <ul id="todoList" class="space-y-4 pt-4">
                    <!-- Task Cards appear here -->
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
